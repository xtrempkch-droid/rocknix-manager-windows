name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Resolve o alerta de depreciação do Node.js

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 opencv-python pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --collect-all cv2 --collect-all PyQt6 rocknix_manager.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rocknix-manager-windows
        path: dist/*.exe
