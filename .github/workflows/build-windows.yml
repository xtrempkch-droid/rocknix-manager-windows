name: Build Windows EXE

on:
  push:
    tags:
      - 'v*' # Gatilho para versões (ex: v0.0.9)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Permissão para o robô escrever na aba de Releases

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller

      - name: Gerar Executável
        run: |
          pyinstaller --onefile --windowed --name "RocknixManager" rocknix_manager.py

      - name: Listar Arquivos (Debug)
        shell: pwsh
        run: |
          if (Test-Path "dist/RocknixManager.exe") {
            Write-Host "Arquivo encontrado com sucesso!"
            ls dist/
          } else {
            Write-Error "O arquivo .exe NÃO foi gerado na pasta dist!"
            exit 1
          }

      - name: Publicar na Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RocknixManager.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
