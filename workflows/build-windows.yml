name: Build Windows

on:
  push:
    tags:
      - 'v*' # Gatilho coerente: roda apenas em versões como v1.0, v2.1, etc.

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # ESSENCIAL: Permite ao robô "escrever" o .exe na página de release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed rocknix_manager.py

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe # Pega o executável gerado na pasta dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
