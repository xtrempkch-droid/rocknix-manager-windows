name: Build Windows

on:
  push:
    tags:
      - 'v*' # O robô só ativa quando crias uma tag (ex: v1.0.3)

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # Permite que o robô anexe o ficheiro na Release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed rocknix_manager.py

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe # Procura o executável na pasta correta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
