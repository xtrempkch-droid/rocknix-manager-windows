name: Build Windows EXE

on:
  push:
    tags:
      - 'v*' # Gatilho correto para Releases

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # ESSENCIAL: Permite anexar o arquivo na Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "RocknixManager" rocknix_manager.py
        # Adicionei --name para garantir que o executável tenha um nome fixo

      - name: Verify dist folder
        shell: pwsh
        run: |
          Child-Item -Path dist/
          # Isso vai mostrar no log se o RocknixManager.exe foi criado

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/RocknixManager.exe
          fail_on_unmatched_files: true # Se o arquivo não existir, o build FICA VERMELHO
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
