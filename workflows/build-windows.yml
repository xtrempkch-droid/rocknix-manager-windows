name: Build Windows

on:
  push:
    tags:
      - 'v*' # Dispara apenas em versões (v1.0.3, v1.0.4...)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Garante o direito de postar na Release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed rocknix_manager.py

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe # Pega qualquer .exe que o PyInstaller criou
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
