name: Build Windows

on:
  push:
    tags:
      - 'v*' # Garante que o robô só trabalhe em versões oficiais

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyqt5 pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed rocknix_manager.py

      - name: Verify Build
        run: dir dist  # Comando Windows para listar a pasta. Se não listar o .exe, o erro é aqui!

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          fail_on_unmatched_files: true # FORÇA o erro se o arquivo sumir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
